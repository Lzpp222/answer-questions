<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员 - 三农学会有奖竞答</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f0e8; padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { color: #2d5a27; font-size: 1.4rem; margin-bottom: 16px; }
    h2 { color: #2d5a27; font-size: 1.1rem; margin: 16px 0 10px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: #2d5a27; color: #fff; }
    button:hover { background: #4a7c43; }
    button.danger { background: #c0392b; }
    button.danger:hover { background: #e74c3c; }
    .login-box { max-width: 320px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button { background: #e0d9cc; color: #333; }
    .tabs button.active { background: #2d5a27; color: #fff; }
    .question-item { padding: 12px; margin: 8px 0; background: #faf6f0; border-radius: 8px; border-left: 4px solid #2d5a27; }
    .question-item .q { font-weight: 600; margin-bottom: 6px; }
    .question-item .ans { color: #27ae60; font-size: 0.95rem; }
    .question-item .exp { color: #666; font-size: 0.9rem; margin-top: 6px; }
    .result-item { padding: 12px; margin: 8px 0; background: #faf6f0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .result-item .info { flex: 1; min-width: 200px; }
    .result-item .name { font-weight: 600; font-size: 1.05rem; }
    .result-item .meta { font-size: 0.9rem; color: #666; margin-top: 6px; line-height: 1.6; }
    .result-item .meta-row { margin: 2px 0; }
    .result-item .meta-label { color: #999; display: inline-block; width: 70px; }
    .error { color: #c0392b; font-size: 0.9rem; margin-top: 8px; }
    .empty { color: #999; text-align: center; padding: 40px; }
    #adminPanel { display: none; }
  </style>
</head>
<body>
  <div id="loginBox" class="card login-box">
    <h1>管理员登录</h1>
    <input type="text" id="adminUser" placeholder="账号" autocomplete="username">
    <input type="password" id="adminPwd" placeholder="密码" autocomplete="current-password">
    <button id="btnLogin">登录</button>
    <p id="loginErr" class="error"></p>
  </div>

  <div id="adminPanel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h1 style="margin:0;">管理员后台</h1>
        <button id="btnLogout" class="btn-outline" style="padding:8px 16px;font-size:0.9rem;background:transparent;border:1px solid #2d5a27;color:#2d5a27;">退出登录</button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="questions">题库与答案</button>
        <button class="tab" data-tab="results">作答记录</button>
      </div>

      <div id="tab-questions" class="tab-content">
        <h2>全部题目（含答案与解析）</h2>
        <div id="questionsList"></div>
      </div>

      <div id="tab-results" class="tab-content" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <h2 style="margin:0;">作答记录</h2>
          <button id="btnRefreshResults" style="padding:6px 12px;font-size:0.9rem;">刷新</button>
        </div>
        <p id="dataHint" class="error" style="display:none;">请配置 github-config.js 或确保本地服务器已启动</p>
        <p id="dataRetry" style="display:none;margin-top:8px;"><button type="button" id="btnRetryData" style="padding:6px 14px;font-size:0.9rem;">重试</button></p>
        <div id="resultsList"></div>
      </div>
    </div>
  </div>

  <script src="github-config.js"></script>
  <script>if(typeof GITHUB_CONFIG==='undefined')window.GITHUB_CONFIG={owner:'',repo:'',branch:'main',dataPath:'data/quiz_results.json',apiBase:''};</script>
  <script>
    const ADMIN_USER = 'Sannong';
    const ADMIN_PWD = 'LZPPadmin_sannong';

    document.getElementById('btnLogin').onclick = function() {
      var u = document.getElementById('adminUser').value.trim();
      var p = document.getElementById('adminPwd').value;
      var err = document.getElementById('loginErr');
      if (u !== ADMIN_USER || p !== ADMIN_PWD) {
        err.textContent = '账号或密码错误（区分大小写）';
        return;
      }
      err.textContent = '';
      sessionStorage.setItem('sannong_admin', '1');
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadQuestions();
      loadResults();
    };

    if (sessionStorage.getItem('sannong_admin') === '1') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadQuestions();
      loadResults();
    }

    document.getElementById('btnLogout').onclick = function() {
      sessionStorage.removeItem('sannong_admin');
      location.reload();
    };

    document.getElementById('btnRefreshResults').onclick = function() {
      loadResults();
    };

    document.querySelectorAll('.tab').forEach(function(btn) {
      btn.onclick = function() {
        document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.style.display = 'none'; });
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
      };
    });

    function loadQuestions() {
      fetch('questions.json').then(function(r) { return r.json(); }).then(function(data) {
        var html = '';
        var idx = 0;
        ['level12','level3','level4','level5'].forEach(function(lev) {
          var arr = data[lev] || [];
          arr.forEach(function(q) {
            idx++;
            var ans = q.answer || (q.answers ? q.answers.join('、') : '-');
            var opts = q.options ? q.options.join(' ') : '';
            html += '<div class="question-item"><div class="q">' + idx + '. ' + (q.question || '') + '</div>';
            if (opts) html += '<div>' + opts + '</div>';
            html += '<div class="ans">答案：' + ans + '</div><div class="exp">解析：' + (q.explanation || '-') + '</div></div>';
          });
        });
        document.getElementById('questionsList').innerHTML = html || '<div class="empty">暂无题目</div>';
      }).catch(function() {
        document.getElementById('questionsList').innerHTML = '<div class="empty">无法加载 questions.json</div>';
      });
    }

    var localPollId = null;
    var useLocalApi = false;
    var githubResults = [];

    document.getElementById('btnRetryData').onclick = function() {
      document.getElementById('dataHint').style.display = 'none';
      document.getElementById('dataRetry').style.display = 'none';
      loadResults();
    };

    function renderResultsList(items) {
      var listEl = document.getElementById('resultsList');
      var html = '';
      items.forEach(function(item) {
        var d = item.data || item;
        var meta = '<div class="meta-row"><span class="meta-label">结果：</span>' + (d.status || '-') + '</div>';
        meta += '<div class="meta-row"><span class="meta-label">答对：</span>' + (d.correctCount != null ? d.correctCount : '-') + ' 题</div>';
        meta += '<div class="meta-row"><span class="meta-label">时间：</span>' + (d.timeStr || '-') + '</div>';
        meta += '<div class="meta-row"><span class="meta-label">详情：</span>' + (d.detail || '-') + '</div>';
        meta += '<div class="meta-row"><span class="meta-label">奖励：</span>' + (d.prize || '-') + '</div>';
        meta += '<div class="meta-row"><span class="meta-label">设备ID：</span>' + (d.deviceId || '-') + '</div>';
        var devId = (d.deviceId || '').replace(/"/g, '&quot;');
        var docId = item.id || (d.id || '');
        html += '<div class="result-item" data-id="' + docId + '" data-device="' + devId + '" data-source="' + (item.source || '') + '"><div class="info"><div class="name">' + (d.userName || '-') + '</div><div class="meta">' + meta + '</div></div><button class="danger" onclick="delResult(this)">删除（允许重答）</button></div>';
      });
      listEl.innerHTML = html || '<div class="empty">暂无作答记录（请先完成一次答题）</div>';
    }
    function loadResults() {
      var listEl = document.getElementById('resultsList');
      var hintEl = document.getElementById('dataHint');
      var retryEl = document.getElementById('dataRetry');
      hintEl.style.display = 'none';
      retryEl.style.display = 'none';
      listEl.innerHTML = '';
      fetch('/api/results').then(function(r) {
        if (r.ok) return r.json();
        throw new Error('not local');
      }).then(function(data) {
        useLocalApi = true;
        var localItems = (data || []).filter(function(d) { return (d.status || '') !== '答题开始'; }).map(function(d) {
          var ts = d.timestamp ? (typeof d.timestamp === 'number' ? d.timestamp : 0) : 0;
          return { _ts: ts, _src: 'local', _id: d.id, deviceId: d.deviceId, userName: d.userName, status: d.status, detail: d.detail, timeStr: d.timeStr, prize: d.prize, correctCount: d.correctCount };
        });
        function mergeAndRender() {
          var ghCfg = typeof GITHUB_CONFIG !== 'undefined' ? GITHUB_CONFIG : {};
          var all = localItems.slice();
          if (ghCfg.owner && ghCfg.repo && githubResults.length > 0) {
            githubResults.forEach(function(d) {
              var ts = d.timestamp || (d.createdAt ? (new Date(d.createdAt.replace(' ', 'T'))).getTime() : 0);
              all.push({ _ts: ts, _src: 'github', _id: d.id, deviceId: d.deviceId, userName: d.userName, status: d.status, detail: d.detail, timeStr: d.timeStr, prize: d.prize, correctCount: d.correctCount });
            });
          }
          var byDevice = {};
          all.forEach(function(d) { var dev = d.deviceId || ''; if (!byDevice[dev] || (d._ts || 0) > (byDevice[dev]._ts || 0)) byDevice[dev] = d; });
          var merged = Object.values(byDevice).sort(function(a, b) { return (b._ts || 0) - (a._ts || 0); });
          renderResultsList(merged.map(function(d) { return { data: d, id: d._id, source: d._src }; }));
        }
        function fetchGitHubForLocal() {
          var cfg = typeof GITHUB_CONFIG !== 'undefined' ? GITHUB_CONFIG : {};
          if (!cfg.owner || !cfg.repo) return;
          var url = '/api/github-results';
          var base = (cfg.apiBase || '').replace(/\/$/, '');
          if (base) url = base + url;
          var rawUrl = 'https://raw.githubusercontent.com/' + cfg.owner + '/' + cfg.repo + '/' + (cfg.branch || 'main') + '/' + (cfg.dataPath || 'data/quiz_results.json');
          fetch(url).catch(function() { return fetch(rawUrl); }).then(function(r) { return r && r.ok ? r.json() : []; }).catch(function() { return []; })
            .then(function(arr) {
              githubResults = Array.isArray(arr) ? arr.filter(function(d) { return (d.status || '') !== '答题开始'; }) : [];
              mergeAndRender();
            });
        }
        mergeAndRender();
        fetchGitHubForLocal();
        if (localPollId) clearInterval(localPollId);
        localPollId = setInterval(function() {
          fetch('/api/results').then(function(r) { return r.ok ? r.json() : []; }).then(function(data) {
            if (!useLocalApi) return;
            localItems = (data || []).filter(function(d) { return (d.status || '') !== '答题开始'; }).map(function(d) {
              var ts = d.timestamp ? (typeof d.timestamp === 'number' ? d.timestamp : 0) : 0;
              return { _ts: ts, _src: 'local', _id: d.id, deviceId: d.deviceId, userName: d.userName, status: d.status, detail: d.detail, timeStr: d.timeStr, prize: d.prize, correctCount: d.correctCount };
            });
            fetchGitHubForLocal();
          });
        }, 3000);
      }).catch(function() {
        useLocalApi = false;
        loadFromGitHub();
      });
    }
    function loadFromGitHub() {
      var listEl = document.getElementById('resultsList');
      var hintEl = document.getElementById('dataHint');
      var retryEl = document.getElementById('dataRetry');
      var cfg = typeof GITHUB_CONFIG !== 'undefined' ? GITHUB_CONFIG : {};
      if (!cfg.owner || !cfg.repo) {
        hintEl.style.display = 'block';
        hintEl.textContent = '请配置 github-config.js（owner、repo）';
        retryEl.style.display = 'block';
        listEl.innerHTML = '';
        return;
      }
      listEl.innerHTML = '';
      var base = (cfg.apiBase || '').replace(/\/$/, '');
      var url = base ? base + '/api/github-results' : '/api/github-results';
      var rawUrl = 'https://raw.githubusercontent.com/' + cfg.owner + '/' + cfg.repo + '/' + (cfg.branch || 'main') + '/' + (cfg.dataPath || 'data/quiz_results.json');
      fetch(url).catch(function() { return fetch(rawUrl); }).then(function(r) { return r && r.ok ? r.json() : []; }).catch(function() { return []; })
        .then(function(arr) {
          githubResults = Array.isArray(arr) ? arr.filter(function(d) { return (d.status || '') !== '答题开始'; }) : [];
          if (githubResults.length > 0) {
            hintEl.style.display = 'none';
            retryEl.style.display = 'none';
            var items = githubResults.map(function(d) {
              var ts = d.timestamp || 0;
              return { data: { _ts: ts, deviceId: d.deviceId, userName: d.userName, status: d.status, detail: d.detail, timeStr: d.timeStr, prize: d.prize, correctCount: d.correctCount }, id: d.id, source: 'github' };
            });
            items.sort(function(a, b) { return (b.data._ts || 0) - (a.data._ts || 0); });
            renderResultsList(items);
            if (localPollId) clearInterval(localPollId);
            localPollId = setInterval(function() {
              fetch(url).catch(function() { return fetch(rawUrl); }).then(function(r) { return r && r.ok ? r.json() : []; }).catch(function() { return []; })
                .then(function(arr) {
                  githubResults = Array.isArray(arr) ? arr.filter(function(d) { return (d.status || '') !== '答题开始'; }) : [];
                  var its = githubResults.map(function(d) {
                    var ts = d.timestamp || 0;
                    return { data: { _ts: ts, deviceId: d.deviceId, userName: d.userName, status: d.status, detail: d.detail, timeStr: d.timeStr, prize: d.prize, correctCount: d.correctCount }, id: d.id, source: 'github' };
                  });
                  its.sort(function(a, b) { return (b.data._ts || 0) - (a.data._ts || 0); });
                  renderResultsList(its);
                });
            }, 5000);
          } else {
            hintEl.style.display = 'block';
            hintEl.textContent = '暂无记录，请完成一次答题后刷新';
            retryEl.style.display = 'block';
            listEl.innerHTML = '';
          }
        })
        .catch(function() {
          hintEl.style.display = 'block';
          hintEl.textContent = '加载失败，请检查网络或 github-config.js';
          retryEl.style.display = 'block';
          listEl.innerHTML = '';
        });
    }

    function delResult(btn) {
      if (!confirm('确定删除此设备的所有记录？该设备将可重新作答。')) return;
      var item = btn.closest('.result-item');
      var deviceId = item && item.getAttribute('data-device');
      var source = item && item.getAttribute('data-source');
      if (!deviceId) return;
      function doLoad() { loadResults(); }
      if (source === 'local' && useLocalApi) {
        fetch('/api/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({deviceId: deviceId}) })
          .then(function(r) { if (r.ok) loadResults(); else alert('删除失败'); })
          .catch(function() { alert('删除失败'); });
        return;
      }
      deleteFromGitHub(deviceId, doLoad);
    }
    function deleteFromGitHub(deviceId, onDone) {
      var cfg = typeof GITHUB_CONFIG !== 'undefined' ? GITHUB_CONFIG : {};
      if (!cfg.owner || !cfg.repo) { onDone && onDone(); return; }
      var base = (cfg.apiBase || '').replace(/\/$/, '');
      var url = (base ? base + '/api/github-delete' : '/api/github-delete');
      fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({deviceId: deviceId}) })
        .then(function(r) { return r.json ? r.json() : { ok: false }; })
        .then(function(res) { if (res && res.ok) loadResults(); })
        .catch(function() {})
        .then(function() { onDone && onDone(); });
    }
  </script>
</body>
</html>

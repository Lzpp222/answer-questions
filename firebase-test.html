<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase 连接测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; }
    .ok { color: green; }
    .err { color: red; }
    pre { background: #f5f5f5; padding: 12px; overflow-x: auto; font-size: 12px; }
    button { padding: 10px 20px; margin: 10px 5px 10px 0; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Firebase 连接测试</h1>
  <div id="result"></div>
  <button onclick="runTest()">重新测试</button>

  <script src="firebase-config.js"></script>
  <script>
    if (typeof FIREBASE_CONFIG === 'undefined' || !FIREBASE_CONFIG || !FIREBASE_CONFIG.apiKey) {
      window.FIREBASE_CONFIG = {
        apiKey: "AIzaSyCbvuztTW-syhjAqwp2uAH2SamUM1CEFOM",
        authDomain: "answer-recode.firebaseapp.com",
        projectId: "answer-recode",
        storageBucket: "answer-recode.firebasestorage.app",
        messagingSenderId: "432504572951",
        appId: "1:432504572951:web:1aa282e57aa0ab2f63a052",
        measurementId: "G-8T6CEQLYE2"
      };
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script>
    function runTest() {
      var el = document.getElementById('result');
      el.innerHTML = '<p>测试中...</p>';
      var logs = [];

      try {
        if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.apiKey) {
          logs.push({ ok: false, msg: 'FIREBASE_CONFIG 未配置或 apiKey 为空' });
          render(logs);
          return;
        }
        logs.push({ ok: true, msg: '配置已加载，projectId: ' + FIREBASE_CONFIG.projectId });

        var app;
        try { app = firebase.app(); } catch (_) { app = firebase.initializeApp(FIREBASE_CONFIG); }
        logs.push({ ok: true, msg: 'Firebase 初始化成功' });

        var db = firebase.firestore(app);
        logs.push({ ok: true, msg: 'Firestore 实例创建成功' });

        db.collection('quiz_results').limit(1).get().then(function(snap) {
          logs.push({ ok: true, msg: '读取成功，当前记录数: ' + snap.size });
          return db.collection('quiz_results').add({
            _test: true,
            time: firebase.firestore.FieldValue.serverTimestamp()
          });
        }).then(function(ref) {
          logs.push({ ok: true, msg: '写入成功！' });
          return ref.delete();
        }).then(function() {
          logs.push({ ok: true, msg: 'Firebase 连接正常，可正常使用。' });
          render(logs);
        }).catch(function(e) {
          logs.push({ ok: false, msg: 'Firestore 错误: ' + (e.message || e.code || JSON.stringify(e)) });
          logs.push({ ok: false, msg: '请到 Firebase 控制台 → Firestore → 规则，设置为: allow read, write: if true;' });
          render(logs);
        });
      } catch (e) {
        logs.push({ ok: false, msg: '异常: ' + e.message });
        render(logs);
      }
    }

    function render(logs) {
      var html = logs.map(function(l) {
        return '<p class="' + (l.ok ? 'ok' : 'err') + '">' + (l.ok ? '✓' : '✗') + ' ' + l.msg + '</p>';
      }).join('');
      document.getElementById('result').innerHTML = html;
    }

    runTest();
  </script>
</body>
</html>
